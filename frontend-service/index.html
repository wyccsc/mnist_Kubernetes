<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MNIST CSV 預測</title>
</head>

<body>

<h1>MNIST CSV 預測系統</h1>

<input type="file" id="fileInput" accept=".csv">
<button onclick="uploadCSV()">送出預測</button>

<h3>結果</h3>
<pre id="output"></pre>

<br>

<button id="downloadBtn" onclick="downloadResult()" style="display:none;">
下載預測結果 CSV
</button>

<script>
const API_URL = "http://192.168.49.2:30080";  // 用 minikube ip + NodePort
// 例如 minikube ip = 192.168.49.2
// api-service NodePort = 30080
// => http://192.168.49.2:30080

async function uploadCSV(){

    const file = document.getElementById("fileInput").files[0];

    if(!file){
        alert("請選擇 CSV 檔案");
        return;
    }

    const formData = new FormData();
    formData.append("datafile",file);

    const res = await fetch(`${API_URL}/upload_predict`,{
        method:"POST",
        body:formData
    });

    const result = await res.json();

    document.getElementById("output").textContent =
        JSON.stringify(result,null,2);

    document.getElementById("downloadBtn").style.display="block";
}

function downloadResult(){
    window.location.href=`${API_URL}/download`;
}
</script>

</body>
</html>
