name: CI - Build Changed Services

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # 🔍 Step 1: Detect changes
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      frontend: ${{ steps.filter.outputs.frontend }}
      model: ${{ steps.filter.outputs.model }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'api-service/**'
            frontend:
              - 'frontend-service/**'
            model:
              - 'model-service/**'

  # 🟡 Step 2: Build API
  api:
    name: Build API
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: version
        run: echo "VERSION=${GITHUB_SHA}" >> $GITHUB_OUTPUT

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push API
        uses: docker/build-push-action@v6
        with:
          context: ./api-service
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/k8s_api_service:${{ steps.version.outputs.VERSION }}
            ${{ secrets.DOCKER_USERNAME }}/k8s_api_service:latest

  # 🔵 Step 3: Build Frontend
  frontend:
    name: Build Frontend
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: version
        run: echo "VERSION=${GITHUB_SHA}" >> $GITHUB_OUTPUT

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend-service
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/k8s_frontend_service:${{ steps.version.outputs.VERSION }}
            ${{ secrets.DOCKER_USERNAME }}/k8s_frontend_service:latest

  # 🟢 Step 4: Build Model
  model:
    name: Build Model
    needs: changes
    if: needs.changes.outputs.model == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: version
        run: echo "VERSION=${GITHUB_SHA}" >> $GITHUB_OUTPUT

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push Model
        uses: docker/build-push-action@v6
        with:
          context: ./model-service
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/k8s_model_service:${{ steps.version.outputs.VERSION }}
            ${{ secrets.DOCKER_USERNAME }}/k8s_model_service:latestname: CI - Build Changed Services

