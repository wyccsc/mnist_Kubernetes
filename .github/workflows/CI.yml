name: CI - Build Changed Services

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # 🔍 Step 1: Detect changes
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      frontend: ${{ steps.filter.outputs.frontend }}
      model: ${{ steps.filter.outputs.model }}

    steps:
      - uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'api-service/**'
            frontend:
              - 'frontend-service/**'
            model:
              - 'model-service/**'

  # 🟡 API
  api:
    name: Build API
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate version
        id: bump
        run: |
          git fetch --tags
          LAST=$(git tag --list "api-*" | sort -V | tail -n1 || echo "")

          if [ -z "$LAST" ]; then
            NEW="1.0.0"
          else
            BASE=${LAST#api-}
            PATCH=$(echo $BASE | awk -F. '{print $3+1}')
            NEW="$(echo $BASE | awk -F. '{print $1"."$2}').$PATCH"
          fi

          echo "VERSION=$NEW" >> $GITHUB_OUTPUT

      - name: Create tag
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git tag api-${{ steps.bump.outputs.VERSION }}
          git push origin api-${{ steps.bump.outputs.VERSION }}

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push API
        uses: docker/build-push-action@v6
        with:
          context: ./api-service
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/k8s_api_service:${{ steps.bump.outputs.VERSION }}
            ${{ secrets.DOCKER_USERNAME }}/k8s_api_service:latest

  # 🔵 Frontend
  frontend:
    name: Build Frontend
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate version
        id: bump
        run: |
          git fetch --tags
          LAST=$(git tag --list "frontend-*" | sort -V | tail -n1 || echo "")

          if [ -z "$LAST" ]; then
            NEW="1.0.0"
          else
            BASE=${LAST#frontend-}
            PATCH=$(echo $BASE | awk -F. '{print $3+1}')
            NEW="$(echo $BASE | awk -F. '{print $1"."$2}').$PATCH"
          fi

          echo "VERSION=$NEW" >> $GITHUB_OUTPUT

      - name: Create tag
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git tag frontend-${{ steps.bump.outputs.VERSION }}
          git push origin frontend-${{ steps.bump.outputs.VERSION }}

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend-service
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/k8s_frontend_service:${{ steps.bump.outputs.VERSION }}
            ${{ secrets.DOCKER_USERNAME }}/k8s_frontend_service:latest

  # 🟢 Model
  model:
    name: Build Model
    needs: changes
    if: needs.changes.outputs.model == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate version
        id: bump
        run: |
          git fetch --tags
          LAST=$(git tag --list "model-*" | sort -V | tail -n1 || echo "")

          if [ -z "$LAST" ]; then
            NEW="1.0.0"
          else
            BASE=${LAST#model-}
            PATCH=$(echo $BASE | awk -F. '{print $3+1}')
            NEW="$(echo $BASE | awk -F. '{print $1"."$2}').$PATCH"
          fi

          echo "VERSION=$NEW" >> $GITHUB_OUTPUT

      - name: Create tag
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git tag model-${{ steps.bump.outputs.VERSION }}
          git push origin model-${{ steps.bump.outputs.VERSION }}

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push Model
        uses: docker/build-push-action@v6
        with:
          context: ./model-service
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/k8s_model_service:${{ steps.bump.outputs.VERSION }}
            ${{ secrets.DOCKER_USERNAME }}/k8s_model_service:latest