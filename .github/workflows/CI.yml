name: CI - Build & Push Images

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:

  api:
    name: Build API Image
    runs-on: ubuntu-latest
    if: contains(join(github.event.commits.*.modified, ','), 'api-service/')
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: echo "VERSION=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: ./api-service
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/k8s_api_service:${{ steps.version.outputs.VERSION }}
            ${{ secrets.DOCKER_USERNAME }}/k8s_api_service:latest

  frontend:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    if: contains(join(github.event.commits.*.modified, ','), 'frontend-service/')
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: echo "VERSION=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend-service
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/k8s_frontend_service:${{ steps.version.outputs.VERSION }}
            ${{ secrets.DOCKER_USERNAME }}/k8s_frontend_service:latest

  model:
    name: Build Model Image
    runs-on: ubuntu-latest
    if: contains(join(github.event.commits.*.modified, ','), 'model-service/')
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: echo "VERSION=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push Model image
        uses: docker/build-push-action@v6
        with:
          context: ./model-service
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/k8s_model_service:${{ steps.version.outputs.VERSION }}
            ${{ secrets.DOCKER_USERNAME }}/k8s_model_service:latest